<div class="shell">
  <aside class="sidebar" aria-label="Основная навигация">
    <div class="brand-block">
      <strong class="brand">Cafe Orders</strong>
      <p>{{ auth.session()?.user?.name }}</p>
    </div>

    <nav>
      @for (link of links; track link.path) {
        <a [routerLink]="link.path" routerLinkActive="active">
          <span aria-hidden="true">{{ link.marker }}</span>
          {{ link.label }}
        </a>
      }
    </nav>

    <div class="sidebar-actions">
      <button tuiButton type="button" appearance="secondary" size="s" (click)="theme.toggle()">
        {{ theme.theme() === 'dark' ? 'Светлая тема' : 'Темная тема' }}
      </button>

      <button tuiButton type="button" appearance="secondary" size="s" (click)="auth.logout()">
        Выйти
      </button>
    </div>
  </aside>

  <main class="content">
    @if (store.error()) {
      <p class="global-error" role="alert">{{ store.error() }}</p>
    }

    <router-outlet />
  </main>
</div>
